<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini FIFA World Cup 2026</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <h1>Panini FIFA World Cup 2026 &mdash; Sticker Album</h1>
  <div class="header-row">
    <div class="stats-bar">
      <span><span id="owned-label">Owned</span>: <strong id="stat-owned">0</strong> / 994</span>
      <span><span id="missing-label">Missing</span>: <strong id="stat-missing">994</strong></span>
      <span><span id="extras-label">Extras</span>: <strong id="stat-extras">0</strong></span>
      <span><span id="completion-label">Completion</span>: <strong id="stat-pct">0%</strong></span>
    </div>
    <button class="export-btn" id="export-btn">Export</button>
    <button class="reset-btn" id="reset-btn">Reset All</button>
  </div>
  <div class="tab-bar" id="tab-bar">
    <button class="active" data-tab="album">Album</button>
    <button data-tab="compare">Compare</button>
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="missing">Missing</button>
    <button data-filter="owned">Owned</button>
    <button data-filter="extras">Extras</button>
  </div>
</header>

<div class="tab-panel active" id="panel-album">
  <div class="album-layout">
    <aside class="country-sidebar" aria-label="Country completion">
      <div class="country-sidebar-title"><span id="complete-sections-label">Complete Sections</span>: <span id="complete-sections-count">0</span> / <span id="complete-sections-total">0</span></div>
      <div class="country-list" id="country-list-left"></div>
    </aside>
    <main id="main"></main>
    <aside class="country-sidebar" aria-label="More country completion">
      <div class="country-sidebar-title" id="sections-label">Sections</div>
      <div class="country-list" id="country-list-right"></div>
    </aside>
  </div>
</div>

<div class="missing-tooltip" id="missing-tooltip"></div>

<div class="settings-panel" aria-label="Display settings">
  <label class="settings-field">
    <span class="settings-label" id="language-label">Language</span>
    <select class="settings-select" id="language-select">
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </label>
  <label class="settings-field">
    <span class="settings-label" id="theme-label">Theme</span>
    <select class="settings-select" id="theme-select">
      <option value="default">Dark / Midnight Gold</option>
      <option value="emerald">Dark / Emerald</option>
      <option value="ruby">Dark / Ruby</option>
      <option value="frost">Dark / Frost</option>
      <option value="daylight">Light / Daylight</option>
      <option value="mint">Light / Mint</option>
      <option value="blush">Light / Blush</option>
      <option value="sage">Light / Sage Cream</option>
    </select>
  </label>
</div>

<div class="tab-panel" id="panel-compare">
  <div class="compare-section">
    <div class="compare-inner">
      <div class="compare-title">Compare</div>
      <div class="compare-fields">
        <input class="compare-input compare-name" id="compare-name" type="text" placeholder="Name (optional)" />
        <select class="compare-mode" id="compare-mode">
          <option value="extras">Their Extras → my missing</option>
          <option value="missing">Their Missing → my extras</option>
        </select>
      </div>
      <br/>
      <textarea class="compare-textarea" id="compare-paste" placeholder="Paste exported sticker list here…"></textarea>
      <button class="compare-btn" id="compare-btn">Compare</button>
      <div class="compare-results" id="compare-results"></div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
