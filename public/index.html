<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini FIFA World Cup 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a3e 0%, #0d2b5e 50%, #1a1a3e 100%);
      border-bottom: 2px solid #c8a84b;
      padding: 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #c8a84b;
      text-transform: uppercase;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
      font-size: 0.8rem;
      color: #aaa;
      flex-wrap: wrap;
    }

    .stats-bar span strong {
      color: #e0e0e0;
    }

    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 12px;
    }

    .tab-bar button {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      padding: 6px 18px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-bar button:hover { color: #ccc; }

    .tab-bar button.active {
      color: #c8a84b;
      border-bottom-color: #c8a84b;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .filter-bar button {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .filter-bar button:hover,
    .filter-bar button.active {
      background: #c8a84b;
      border-color: #c8a84b;
      color: #000;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    main {
      padding: 24px 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a4a;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c8a84b;
    }

    .section-progress {
      font-size: 0.75rem;
      color: #666;
      margin-left: auto;
    }

    .section-progress .count {
      color: #4caf82;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
      gap: 6px;
    }

    .sticker {
      position: relative;
      aspect-ratio: 2/3;
      border-radius: 5px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 2px;
      transition: transform 0.12s, border-color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .sticker:hover {
      transform: scale(1.07);
      border-color: #444;
      z-index: 2;
    }

    .sticker:active {
      transform: scale(0.97);
    }

    .sticker .code {
      font-size: clamp(0.45rem, 1.2vw, 0.6rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-align: center;
      line-height: 1.2;
      color: #888;
      word-break: break-all;
    }

    /* OWNED state */
    .sticker.owned {
      background: #1a3d2b;
      border-color: #2e7d52;
    }

    .sticker.owned .code {
      color: #5dba8a;
    }

    /* FOIL / special stickers */
    .sticker.foil {
      background: linear-gradient(135deg, #1e1a0a, #2a2010);
      border-color: #6a5a1e;
    }

    .sticker.foil .code {
      color: #c8a84b;
    }

    .sticker.foil.owned {
      background: linear-gradient(135deg, #3d3200, #5a4a00);
      border-color: #e8c45a;
      box-shadow: 0 0 0 1px #c8a84b inset;
    }

    .sticker.foil.owned .code {
      color: #ffe07a;
    }

    /* EXTRA badge */
    .extra-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #e53935;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 800;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #0a0a1a;
      z-index: 3;
      pointer-events: none;
    }

    /* Coca-Cola stickers */
    .sticker.cocacola {
      background: #2a0d0d;
      border-color: #6b1f1f;
    }

    .sticker.cocacola .code {
      color: #c0504a;
    }

    .sticker.cocacola.owned {
      background: #5a1414;
      border-color: #e53935;
      box-shadow: 0 0 0 1px #c0504a inset;
    }

    .sticker.cocacola.owned .code {
      color: #ff9a97;
    }

    /* Section hidden by filter */
    .section.hidden {
      display: none;
    }

    /* Reset button */
    .reset-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: #e53935;
      color: #e53935;
    }

    .export-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .export-btn:hover {
      border-color: #4caf82;
      color: #4caf82;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Compare section */
    .compare-section {
      padding: 28px 16px 40px;
    }

    .compare-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .compare-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c8a84b;
      margin-bottom: 16px;
    }

    .compare-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 12px;
      align-items: start;
    }

    .compare-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .compare-input {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 12px;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .compare-input:focus { border-color: #c8a84b; }

    .compare-name { width: 160px; }

    .compare-mode {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 10px;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .compare-mode:focus { border-color: #c8a84b; }

    .compare-textarea {
      width: 100%;
      min-height: 120px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 0.78rem;
      font-family: monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }

    .compare-textarea:focus { border-color: #c8a84b; }

    .compare-btn {
      background: #c8a84b;
      border: none;
      border-radius: 6px;
      color: #000;
      padding: 8px 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .compare-btn:hover { background: #daba60; }

    .compare-results {
      margin-top: 20px;
    }

    .compare-result-block {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .compare-result-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: #c8a84b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .compare-result-row {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .compare-result-row strong { color: #e0e0e0; }

    .compare-match { color: #4caf82; font-weight: 600; }
    .compare-none  { color: #666; font-style: italic; }

    .compare-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .compare-remove-btn {
      background: transparent;
      border: 1px solid #333;
      color: #555;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .compare-remove-btn:hover {
      border-color: #e53935;
      color: #e53935;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
        gap: 5px;
      }
      .extra-badge {
        width: 15px;
        height: 15px;
        font-size: 0.52rem;
        top: -5px;
        right: -5px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Panini FIFA World Cup 2026 &mdash; Sticker Album</h1>
  <div class="header-row">
    <div class="stats-bar">
      <span>Owned: <strong id="stat-owned">0</strong> / 994</span>
      <span>Extras: <strong id="stat-extras">0</strong></span>
      <span>Completion: <strong id="stat-pct">0%</strong></span>
    </div>
    <button class="export-btn" id="export-btn">Export</button>
    <button class="reset-btn" id="reset-btn">Reset All</button>
  </div>
  <div class="tab-bar" id="tab-bar">
    <button class="active" data-tab="album">Album</button>
    <button data-tab="compare">Compare</button>
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="missing">Missing</button>
    <button data-filter="owned">Owned</button>
    <button data-filter="extras">Extras</button>
  </div>
</header>

<div class="tab-panel active" id="panel-album">
  <main id="main"></main>
</div>

<div class="tab-panel" id="panel-compare">
  <div class="compare-section">
    <div class="compare-inner">
      <div class="compare-title">Compare</div>
      <div class="compare-fields">
        <input class="compare-input compare-name" id="compare-name" type="text" placeholder="Name (optional)" />
        <select class="compare-mode" id="compare-mode">
          <option value="extras">Their Extras → my missing</option>
          <option value="missing">Their Missing → my extras</option>
        </select>
      </div>
      <br/>
      <textarea class="compare-textarea" id="compare-paste" placeholder="Paste exported sticker list here…"></textarea>
      <button class="compare-btn" id="compare-btn">Compare</button>
      <div class="compare-results" id="compare-results"></div>
    </div>
  </div>
</div>

<script>
const ALBUM_DATA = {
  panini: ["00"],
  special: [
    "FWC1","FWC2","FWC3","FWC4","FWC5","FWC6","FWC7","FWC8",
    "FWC9","FWC10","FWC11","FWC12","FWC13","FWC14","FWC15","FWC16",
    "FWC17","FWC18","FWC19"
  ],
  teams: [
    {code:"ALG",name:"Algeria",count:20},
    {code:"ARG",name:"Argentina",count:20},
    {code:"AUS",name:"Australia",count:20},
    {code:"AUT",name:"Austria",count:20},
    {code:"BEL",name:"Belgium",count:20},
    {code:"BIH",name:"Bosnia & Herzegovina",count:20},
    {code:"BRA",name:"Brazil",count:20},
    {code:"CAN",name:"Canada",count:20},
    {code:"CPV",name:"Cape Verde",count:20},
    {code:"COL",name:"Colombia",count:20},
    {code:"CRO",name:"Croatia",count:20},
    {code:"CUW",name:"Curaçao",count:20},
    {code:"CZE",name:"Czechia",count:20},
    {code:"COD",name:"DR Congo",count:20},
    {code:"ECU",name:"Ecuador",count:20},
    {code:"EGY",name:"Egypt",count:20},
    {code:"ENG",name:"England",count:20},
    {code:"FRA",name:"France",count:20},
    {code:"GER",name:"Germany",count:20},
    {code:"GHA",name:"Ghana",count:20},
    {code:"HAI",name:"Haiti",count:20},
    {code:"IRN",name:"Iran",count:20},
    {code:"IRQ",name:"Iraq",count:20},
    {code:"JPN",name:"Japan",count:20},
    {code:"JOR",name:"Jordan",count:20},
    {code:"MAR",name:"Morocco",count:20},
    {code:"MEX",name:"Mexico",count:20},
    {code:"NED",name:"Netherlands",count:20},
    {code:"NZL",name:"New Zealand",count:20},
    {code:"NOR",name:"Norway",count:20},
    {code:"PAN",name:"Panama",count:20},
    {code:"PAR",name:"Paraguay",count:20},
    {code:"POR",name:"Portugal",count:20},
    {code:"QAT",name:"Qatar",count:20},
    {code:"KSA",name:"Saudi Arabia",count:20},
    {code:"SCO",name:"Scotland",count:20},
    {code:"SEN",name:"Senegal",count:20},
    {code:"RSA",name:"South Africa",count:20},
    {code:"KOR",name:"South Korea",count:20},
    {code:"ESP",name:"Spain",count:20},
    {code:"SWE",name:"Sweden",count:20},
    {code:"SUI",name:"Switzerland",count:20},
    {code:"TUN",name:"Tunisia",count:20},
    {code:"TUR",name:"Turkey",count:20},
    {code:"USA",name:"USA",count:20},
    {code:"URU",name:"Uruguay",count:20},
    {code:"UZB",name:"Uzbekistan",count:20},
  ],
  cocacola: Array.from({length: 14}, (_, i) => 'CC' + (i + 1))
};

// state: { [id]: 0 = missing, 1 = owned, 2+ = owned + (n-1) extras }
let state = {};
let saveTimer = null;

async function loadState() {
  try {
    const res = await fetch('/api/state');
    state = await res.json();
  } catch(e) { state = {}; }
}

function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch('/api/state', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(state)
    });
  }, 300);
}

function getVal(id) { return state[id] || 0; }

function handleClick(id) {
  const v = getVal(id);
  state[id] = v + 1;
  saveState();
  updateSticker(id);
  updateStats();
  applyFilter(currentFilter);
}

function handleRightClick(e, id) {
  e.preventDefault();
  const v = getVal(id);
  if (v <= 0) return;
  state[id] = v - 1;
  if (state[id] === 0) delete state[id];
  saveState();
  updateSticker(id);
  updateStats();
  applyFilter(currentFilter);
}

function updateSticker(id) {
  const el = document.getElementById('s-' + id);
  if (!el) return;
  const v = getVal(id);
  el.classList.toggle('owned', v >= 1);
  let badge = el.querySelector('.extra-badge');
  if (v >= 2) {
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'extra-badge';
      el.appendChild(badge);
    }
    badge.textContent = '+' + (v - 1);
  } else {
    if (badge) badge.remove();
  }
}

function buildSection(title, stickers, isFoil, extraClass) {
  const section = document.createElement('section');
  section.className = 'section';
  section.dataset.section = title;

  const header = document.createElement('div');
  header.className = 'section-header';

  const h2 = document.createElement('h2');
  h2.className = 'section-title';
  h2.textContent = title;

  const prog = document.createElement('span');
  prog.className = 'section-progress';
  prog.dataset.section = title;
  header.appendChild(h2);
  header.appendChild(prog);
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'grid';

  stickers.forEach(id => {
    const cell = document.createElement('div');
    cell.className = 'sticker' + (isFoil ? ' foil' : '') + (extraClass ? ' ' + extraClass : '');
    cell.id = 's-' + id;
    cell.dataset.id = id;

    const code = document.createElement('span');
    code.className = 'code';
    code.textContent = id;
    cell.appendChild(code);

    cell.addEventListener('click', () => handleClick(id));
    cell.addEventListener('contextmenu', e => handleRightClick(e, id));

    grid.appendChild(cell);
  });

  section.appendChild(grid);
  return section;
}

function buildAlbum() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Panini logo sticker
  main.appendChild(buildSection('Panini', ALBUM_DATA.panini, true));

  // Special / FWC stickers
  main.appendChild(buildSection('FWC — Special Stickers', ALBUM_DATA.special, true));

  // Team sections
  ALBUM_DATA.teams.forEach(team => {
    const ids = Array.from({length: team.count}, (_, i) => team.code + (i + 1));
    main.appendChild(buildSection(team.code + ' — ' + team.name, ids, false));
  });

  // Coca-Cola section
  main.appendChild(buildSection('CocaCola', ALBUM_DATA.cocacola, false, 'cocacola'));
}

function updateStats() {
  let owned = 0, extras = 0;
  Object.entries(state).forEach(([id, v]) => {
    if (v >= 1) owned++;
    if (v >= 2) extras += (v - 1);
  });
  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-extras').textContent = extras;
  document.getElementById('stat-pct').textContent = Math.round(owned / 994 * 100) + '%';

  // Section progress
  document.querySelectorAll('.section-progress[data-section]').forEach(el => {
    const sectionEl = el.closest('.section');
    const cells = sectionEl.querySelectorAll('.sticker');
    const total = cells.length;
    let sOwned = 0;
    cells.forEach(c => { if (getVal(c.dataset.id) >= 1) sOwned++; });
    el.innerHTML = `<span class="count">${sOwned}</span> / ${total}`;
  });
}

function refreshAllStickers() {
  document.querySelectorAll('.sticker').forEach(el => {
    updateSticker(el.dataset.id);
  });
}

let currentFilter = 'all';

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('#filter-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });

  document.querySelectorAll('.section').forEach(section => {
    const cells = section.querySelectorAll('.sticker');
    let visibleCount = 0;

    cells.forEach(cell => {
      const v = getVal(cell.dataset.id);
      let show = true;
      if (filter === 'missing') show = v === 0;
      else if (filter === 'owned') show = v >= 1;
      else if (filter === 'extras') show = v >= 2;
      cell.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });

    section.classList.toggle('hidden', filter !== 'all' && visibleCount === 0);
  });
}

document.getElementById('filter-bar').addEventListener('click', e => {
  if (e.target.dataset.filter) applyFilter(e.target.dataset.filter);
});

document.getElementById('tab-bar').addEventListener('click', e => {
  const tab = e.target.dataset.tab;
  if (!tab) return;
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.getElementById('filter-bar').style.display = tab === 'album' ? '' : 'none';
});

// Country code → flag emoji
const FLAG = {
  "00":"🏅","FWC":"🏆",
  "ALG":"🇩🇿","ARG":"🇦🇷","AUS":"🇦🇺","AUT":"🇦🇹","BEL":"🇧🇪",
  "BIH":"🇧🇦","BRA":"🇧🇷","CAN":"🇨🇦","CPV":"🇨🇻","COL":"🇨🇴",
  "CRO":"🇭🇷","CUW":"🇨🇼","CZE":"🇨🇿","COD":"🇨🇩","ECU":"🇪🇨",
  "EGY":"🇪🇬","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","FRA":"🇫🇷","GER":"🇩🇪","GHA":"🇬🇭",
  "HAI":"🇭🇹","IRN":"🇮🇷","IRQ":"🇮🇶","JPN":"🇯🇵","JOR":"🇯🇴",
  "MAR":"🇲🇦","MEX":"🇲🇽","NED":"🇳🇱","NZL":"🇳🇿","NOR":"🇳🇴",
  "PAN":"🇵🇦","PAR":"🇵🇾","POR":"🇵🇹","QAT":"🇶🇦","KSA":"🇸🇦",
  "SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","SEN":"🇸🇳","RSA":"🇿🇦","KOR":"🇰🇷","ESP":"🇪🇸",
  "SWE":"🇸🇪","SUI":"🇨🇭","TUN":"🇹🇳","TUR":"🇹🇷","USA":"🇺🇸",
  "URU":"🇺🇾","UZB":"🇺🇿","CC":"🥤"
};

function exportList() {
  // Gather all visible sections
  const lines = [];
  const filterLabel = currentFilter === 'all' ? 'All'
    : currentFilter === 'missing' ? 'Missing'
    : currentFilter === 'owned' ? 'Owned'
    : 'Extras';

  lines.push(`Panini FIFA World Cup 2026 — ${filterLabel} Stickers`);
  lines.push('');

  document.querySelectorAll('.section:not(.hidden)').forEach(section => {
    const titleEl = section.querySelector('.section-title');
    const title = titleEl ? titleEl.textContent : '';

    // Collect visible sticker cells
    const visibleCells = [...section.querySelectorAll('.sticker')]
      .filter(c => c.style.display !== 'none');

    if (visibleCells.length === 0) return;

    // Determine prefix for flag lookup
    const firstId = visibleCells[0].dataset.id;
    const prefix = firstId.replace(/\d+$/, '');
    const flagKey = FLAG[prefix] ? prefix : (FLAG[firstId] ? firstId : prefix);
    const flag = FLAG[flagKey] || FLAG[prefix] || '';

    const parts = visibleCells.map(c => {
      const id = c.dataset.id;
      const num = id.replace(/^[A-Za-z]+/, '');
      const v = getVal(id);
      if (currentFilter === 'extras') return v > 2 ? `${num}x${v - 1}` : num;
      return v >= 2 ? `${num}x${v}` : num;
    });

    lines.push(`${flag}  ${title}: ${parts.join(', ')}`);
  });

  const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fwc2026_${currentFilter}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('export-btn').addEventListener('click', exportList);

// ── Compare ──────────────────────────────────────────────────────────────────

function parsePaste(text) {
  const ids = new Set();
  for (const line of text.split('\n')) {
    const colonIdx = line.indexOf(':');
    if (colonIdx === -1) continue;
    const left = line.slice(0, colonIdx).trim();
    const right = line.slice(colonIdx + 1).trim();
    if (!right) continue;
    let prefix = '';
    const tokens = left.split(/[\s—–]+/);
    const codeToken = tokens.reverse().find(t => /^[A-Z0-9]{2,5}$/.test(t));
    if (codeToken) prefix = codeToken === 'Stickers' ? 'FWC' : codeToken;
    else if (left.includes('CocaCola')) prefix = 'CC';
    for (const item of right.split(',').map(s => s.trim()).filter(Boolean)) {
      const num = item.replace(/x\d+$/i, '').trim();
      if (!num) continue;
      ids.add(/^[A-Za-z]/.test(num) ? num : prefix + num);
    }
  }
  return ids;
}

function computeMatches(theirIds, mode) {
  const grouped = {};
  for (const id of theirIds) {
    const prefix = id.replace(/\d+$/, '');
    const num = id.replace(/^[A-Za-z]+/, '');
    const myVal = getVal(id);
    const match = mode === 'extras' ? myVal === 0 : myVal >= 2;
    if (match) {
      if (!grouped[prefix]) grouped[prefix] = [];
      grouped[prefix].push({ num, id, myVal });
    }
  }
  return grouped;
}

function renderCompareBlock(entry) {
  const { id, name, mode, grouped } = entry;
  const prefixes = Object.keys(grouped);
  const totalMatches = prefixes.reduce((s, p) => s + grouped[p].length, 0);
  const modeLabel = mode === 'extras'
    ? "stickers they have extra that you're missing"
    : "stickers they need that you have extra";

  const block = document.createElement('div');
  block.className = 'compare-result-block';
  block.dataset.id = id;

  let html = `<div class="compare-result-header">
    <div class="compare-result-name">${name} — ${totalMatches} match${totalMatches !== 1 ? 'es' : ''}</div>
    <button class="compare-remove-btn" data-id="${id}">Remove</button>
  </div>`;
  html += `<div class="compare-result-row" style="margin-bottom:10px;font-size:0.72rem;color:#666;">${modeLabel}</div>`;

  if (totalMatches === 0) {
    html += `<div class="compare-none">No matches found.</div>`;
  } else {
    for (const prefix of prefixes.sort()) {
      const flag = FLAG[prefix] || '';
      const parts = grouped[prefix].map(({ num, myVal }) => {
        if (mode === 'missing') {
          const extras = myVal - 1;
          return extras > 1 ? `<span class="compare-match">${num}x${extras}</span>` : `<span class="compare-match">${num}</span>`;
        }
        return `<span class="compare-match">${num}</span>`;
      });
      html += `<div class="compare-result-row">${flag} <strong>${prefix}:</strong> ${parts.join(', ')}</div>`;
    }
  }

  block.innerHTML = html;
  block.querySelector('.compare-remove-btn').addEventListener('click', () => removeCompareEntry(id));
  return block;
}

async function loadCompareHistory() {
  try {
    const res = await fetch('/api/compare');
    const entries = await res.json();
    const resultsEl = document.getElementById('compare-results');
    resultsEl.innerHTML = '';
    entries.forEach(entry => resultsEl.appendChild(renderCompareBlock(entry)));
  } catch(e) {}
}

async function removeCompareEntry(id) {
  await fetch(`/api/compare/${id}`, { method: 'DELETE' });
  const block = document.querySelector(`.compare-result-block[data-id="${id}"]`);
  if (block) block.remove();
}

async function runCompare() {
  const name = document.getElementById('compare-name').value.trim() || 'Result';
  const mode = document.getElementById('compare-mode').value;
  const paste = document.getElementById('compare-paste').value;
  const resultsEl = document.getElementById('compare-results');

  const theirIds = parsePaste(paste);
  if (theirIds.size === 0) {
    resultsEl.insertAdjacentHTML('afterbegin', '<p class="compare-none">Could not parse any sticker IDs from the pasted text.</p>');
    return;
  }

  const grouped = computeMatches(theirIds, mode);
  const entry = { name, mode, grouped };

  const res = await fetch('/api/compare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  });
  const saved = await res.json();

  resultsEl.insertBefore(renderCompareBlock(saved), resultsEl.firstChild);
  document.getElementById('compare-paste').value = '';
}

document.getElementById('compare-btn').addEventListener('click', runCompare);

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Reset all sticker data? This cannot be undone.')) {
    state = {};
    saveState();
    refreshAllStickers();
    updateStats();
    applyFilter(currentFilter);
  }
});

// Init
buildAlbum();
loadState().then(() => {
  refreshAllStickers();
  updateStats();
});
loadCompareHistory();
