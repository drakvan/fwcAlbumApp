<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panini FIFA World Cup 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a1a;
      --header-bg: linear-gradient(135deg, #1a1a3e 0%, #0d2b5e 50%, #1a1a3e 100%);
      --panel: #111126;
      --panel-strong: #1a1a2e;
      --panel-hover: #22223c;
      --border: #2a2a4a;
      --border-strong: #444;
      --text: #e0e0e0;
      --muted: #aaa;
      --muted-strong: #888;
      --muted-soft: #666;
      --accent: #c8a84b;
      --accent-hover: #daba60;
      --accent-text: #000;
      --success: #4caf82;
      --success-bg: #173423;
      --success-border: #2e7d52;
      --success-text: #b7f0ce;
      --danger: #e53935;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    body[data-theme="emerald"] {
      --bg: #061512;
      --header-bg: linear-gradient(135deg, #082018 0%, #12372e 52%, #071512 100%);
      --panel: #0c1f1b;
      --panel-strong: #112b24;
      --panel-hover: #18382f;
      --border: #1d493d;
      --border-strong: #2f6d5b;
      --text: #e5f5ef;
      --muted: #a9c7bd;
      --muted-strong: #86aa9d;
      --muted-soft: #6f9286;
      --accent: #7fd8aa;
      --accent-hover: #9ce8c2;
      --accent-text: #061512;
      --success: #8be6b5;
      --success-bg: #123725;
      --success-border: #3d9b6a;
      --success-text: #d8f8e6;
    }

    body[data-theme="ruby"] {
      --bg: #16090f;
      --header-bg: linear-gradient(135deg, #2a0d17 0%, #4a1426 50%, #180910 100%);
      --panel: #221018;
      --panel-strong: #301622;
      --panel-hover: #3d1d2b;
      --border: #5a2638;
      --border-strong: #8a4059;
      --text: #f5e7ec;
      --muted: #cfadb8;
      --muted-strong: #ad8492;
      --muted-soft: #8f6875;
      --accent: #ff8ba7;
      --accent-hover: #ffadc0;
      --accent-text: #16090f;
      --success: #8ddfae;
      --success-bg: #1e3325;
      --success-border: #4b9867;
      --success-text: #d9f5e4;
    }

    body[data-theme="frost"] {
      --bg: #07131d;
      --header-bg: linear-gradient(135deg, #0b2233 0%, #173d54 50%, #07131d 100%);
      --panel: #0d1d2a;
      --panel-strong: #132b3a;
      --panel-hover: #1d3a4d;
      --border: #244b63;
      --border-strong: #3e7898;
      --text: #e8f3f8;
      --muted: #acc7d4;
      --muted-strong: #87aaba;
      --muted-soft: #6b8c9b;
      --accent: #7cc7e8;
      --accent-hover: #a1dcf3;
      --accent-text: #06121a;
      --success: #96d89d;
      --success-bg: #17351f;
      --success-border: #4f9659;
      --success-text: #dcf5de;
    }

    body[data-theme="daylight"] {
      --bg: #eef4f8;
      --header-bg: linear-gradient(135deg, #f8fbfd 0%, #d7e8f2 52%, #edf5f9 100%);
      --panel: #ffffff;
      --panel-strong: #e8f1f6;
      --panel-hover: #d8e8f0;
      --border: #b7cad5;
      --border-strong: #7896a6;
      --text: #172a35;
      --muted: #4f6875;
      --muted-strong: #607986;
      --muted-soft: #718895;
      --accent: #1b6f95;
      --accent-hover: #2c84ad;
      --accent-text: #ffffff;
      --success: #1d7a4a;
      --success-bg: #dff3e8;
      --success-border: #59a979;
      --success-text: #155d38;
      --shadow: rgba(23, 42, 53, 0.18);
    }

    body[data-theme="mint"] {
      --bg: #eef8f2;
      --header-bg: linear-gradient(135deg, #f7fcf9 0%, #d5f0df 52%, #eef8f2 100%);
      --panel: #ffffff;
      --panel-strong: #e3f2e9;
      --panel-hover: #d2e9dc;
      --border: #acc9b9;
      --border-strong: #6f9b82;
      --text: #173125;
      --muted: #4f705f;
      --muted-strong: #63836f;
      --muted-soft: #759081;
      --accent: #25744b;
      --accent-hover: #32875a;
      --accent-text: #ffffff;
      --success: #197247;
      --success-bg: #dff5e8;
      --success-border: #59aa78;
      --success-text: #125432;
      --shadow: rgba(23, 49, 37, 0.18);
    }

    body[data-theme="blush"] {
      --bg: #f8f0f4;
      --header-bg: linear-gradient(135deg, #fff8fb 0%, #efd7e2 52%, #f8f0f4 100%);
      --panel: #ffffff;
      --panel-strong: #f4e7ed;
      --panel-hover: #ead7e1;
      --border: #cfb1bf;
      --border-strong: #9f7588;
      --text: #331a26;
      --muted: #745567;
      --muted-strong: #866578;
      --muted-soft: #957688;
      --accent: #a03b67;
      --accent-hover: #b44f7a;
      --accent-text: #ffffff;
      --success: #247447;
      --success-bg: #e2f3e8;
      --success-border: #64a97c;
      --success-text: #185632;
      --shadow: rgba(51, 26, 38, 0.18);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a3e 0%, #0d2b5e 50%, #1a1a3e 100%);
      border-bottom: 2px solid #c8a84b;
      padding: 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #c8a84b;
      text-transform: uppercase;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 8px;
      font-size: 0.8rem;
      color: #aaa;
      flex-wrap: wrap;
    }

    .stats-bar span strong {
      color: #e0e0e0;
    }

    .tab-bar {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 12px;
    }

    .tab-bar button {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      padding: 6px 18px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-bar button:hover { color: #ccc; }

    .tab-bar button.active {
      color: #c8a84b;
      border-bottom-color: #c8a84b;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .filter-bar button {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .filter-bar button:hover,
    .filter-bar button.active {
      background: #c8a84b;
      border-color: #c8a84b;
      color: #000;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .album-layout {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr) 230px;
      gap: 16px;
      padding: 24px 16px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .country-sidebar {
      position: sticky;
      top: var(--sidebar-top, 136px);
      align-self: start;
      max-height: calc(100vh - var(--sidebar-top, 136px) - 16px);
      overflow: auto;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      background: #111126;
    }

    .country-sidebar-title {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #111126;
      border-bottom: 1px solid #2a2a4a;
      color: #c8a84b;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 10px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .country-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 5px;
    }

    .country-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      width: 100%;
      min-height: 30px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #aaa;
      cursor: pointer;
      font: inherit;
      padding: 5px 7px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .country-row:hover {
      background: #1a1a2e;
      border-color: #333356;
      color: #e0e0e0;
    }

    .country-row.complete {
      background: #173423;
      border-color: #2e7d52;
      color: #b7f0ce;
    }

    .country-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .country-completion {
      color: #777;
      font-size: 0.68rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .country-row.complete .country-completion {
      color: #5dba8a;
    }

    main {
      min-width: 0;
    }

    .missing-tooltip {
      position: fixed;
      z-index: 300;
      display: none;
      max-width: min(360px, calc(100vw - 24px));
      background: #080815;
      border: 1px solid #c8a84b;
      border-radius: 6px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
      color: #e0e0e0;
      font-size: 0.74rem;
      line-height: 1.45;
      padding: 8px 10px;
      pointer-events: none;
      word-break: break-word;
    }

    .missing-tooltip.visible {
      display: block;
    }

    .missing-tooltip-label {
      color: #c8a84b;
      display: block;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a4a;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c8a84b;
    }

    .section-progress {
      font-size: 0.75rem;
      color: #666;
      margin-left: auto;
    }

    .section-progress .count {
      color: #4caf82;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(58px, 1fr));
      gap: 6px;
    }

    .sticker {
      position: relative;
      aspect-ratio: 2/3;
      border-radius: 5px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 2px;
      transition: transform 0.12s, border-color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .sticker:hover {
      transform: scale(1.07);
      border-color: #444;
      z-index: 2;
    }

    .sticker:active {
      transform: scale(0.97);
    }

    .sticker .code {
      font-size: clamp(0.45rem, 1.2vw, 0.6rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-align: center;
      line-height: 1.2;
      color: #888;
      word-break: break-all;
    }

    /* OWNED state */
    .sticker.owned {
      background: #1a3d2b;
      border-color: #2e7d52;
    }

    .sticker.owned .code {
      color: #5dba8a;
    }

    /* FOIL / special stickers */
    .sticker.foil {
      background: linear-gradient(135deg, #1e1a0a, #2a2010);
      border-color: #6a5a1e;
    }

    .sticker.foil .code {
      color: #c8a84b;
    }

    .sticker.foil.owned {
      background: linear-gradient(135deg, #3d3200, #5a4a00);
      border-color: #e8c45a;
      box-shadow: 0 0 0 1px #c8a84b inset;
    }

    .sticker.foil.owned .code {
      color: #ffe07a;
    }

    /* EXTRA badge */
    .extra-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #e53935;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 800;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #0a0a1a;
      z-index: 3;
      pointer-events: none;
    }

    /* Coca-Cola stickers */
    .sticker.cocacola {
      background: #2a0d0d;
      border-color: #6b1f1f;
    }

    .sticker.cocacola .code {
      color: #c0504a;
    }

    .sticker.cocacola.owned {
      background: #5a1414;
      border-color: #e53935;
      box-shadow: 0 0 0 1px #c0504a inset;
    }

    .sticker.cocacola.owned .code {
      color: #ff9a97;
    }

    /* Section hidden by filter */
    .section.hidden {
      display: none;
    }

    /* Reset button */
    .reset-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .reset-btn:hover {
      border-color: #e53935;
      color: #e53935;
    }

    .export-btn {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .export-btn:hover {
      border-color: #4caf82;
      color: #4caf82;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    /* Compare section */
    .compare-section {
      padding: 28px 16px 40px;
    }

    .compare-inner {
      max-width: 800px;
      margin: 0 auto;
    }

    .compare-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c8a84b;
      margin-bottom: 16px;
    }

    .compare-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 12px;
      align-items: start;
    }

    .compare-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .compare-input {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 12px;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .compare-input:focus { border-color: #c8a84b; }

    .compare-name { width: 160px; }

    .compare-mode {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 7px 10px;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .compare-mode:focus { border-color: #c8a84b; }

    .compare-textarea {
      width: 100%;
      min-height: 120px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 0.78rem;
      font-family: monospace;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }

    .compare-textarea:focus { border-color: #c8a84b; }

    .compare-btn {
      background: #c8a84b;
      border: none;
      border-radius: 6px;
      color: #000;
      padding: 8px 20px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .compare-btn:hover { background: #daba60; }

    .compare-results {
      margin-top: 20px;
    }

    .compare-result-block {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .compare-result-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: #c8a84b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .compare-result-row {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .compare-result-row strong { color: #e0e0e0; }

    .compare-match { color: #4caf82; font-weight: 600; }
    .compare-none  { color: #666; font-style: italic; }

    .compare-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .compare-remove-btn {
      background: transparent;
      border: 1px solid #333;
      color: #555;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .compare-remove-btn:hover {
      border-color: #e53935;
      color: #e53935;
    }

    .settings-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 400;
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px;
      align-items: end;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 28px var(--shadow);
      padding: 10px;
    }

    .settings-field {
      display: grid;
      gap: 4px;
    }

    .settings-label {
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .settings-select {
      min-width: 118px;
      background: var(--panel-strong);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.76rem;
      outline: none;
      padding: 6px 8px;
    }

    .settings-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    header {
      background: var(--header-bg);
      border-bottom-color: var(--accent);
    }

    header h1,
    .tab-bar button.active,
    .country-sidebar-title,
    .missing-tooltip-label,
    .section-title,
    .compare-title,
    .compare-result-name {
      color: var(--accent);
    }

    .stats-bar,
    .country-row,
    .compare-result-row,
    .filter-bar button,
    .reset-btn,
    .export-btn {
      color: var(--muted);
    }

    .stats-bar span strong,
    .compare-result-row strong {
      color: var(--text);
    }

    .tab-bar button {
      color: var(--muted-strong);
    }

    .tab-bar button:hover {
      color: var(--text);
    }

    .tab-bar button.active {
      border-bottom-color: var(--accent);
    }

    .filter-bar button,
    .reset-btn,
    .export-btn {
      border-color: var(--border-strong);
    }

    .filter-bar button:hover,
    .filter-bar button.active,
    .compare-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }

    .compare-btn:hover {
      background: var(--accent-hover);
    }

    .country-sidebar,
    .country-sidebar-title,
    .compare-result-block {
      background: var(--panel);
      border-color: var(--border);
    }

    .country-row:hover {
      background: var(--panel-strong);
      border-color: var(--border-strong);
      color: var(--text);
    }

    .country-row.complete {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .country-row.complete .country-completion,
    .section-progress .count,
    .compare-match,
    .export-btn:hover {
      color: var(--success);
    }

    .country-completion,
    .section-progress,
    .compare-none {
      color: var(--muted-soft);
    }

    .missing-tooltip {
      background: var(--bg);
      border-color: var(--accent);
      box-shadow: 0 10px 28px var(--shadow);
      color: var(--text);
    }

    .section-header,
    .sticker,
    .compare-input,
    .compare-mode,
    .compare-textarea {
      border-color: var(--border);
    }

    .sticker,
    .compare-input,
    .compare-mode,
    .compare-textarea {
      background: var(--panel-strong);
      color: var(--text);
    }

    .sticker:hover {
      border-color: var(--border-strong);
    }

    .sticker .code {
      color: var(--muted-strong);
    }

    .compare-input:focus,
    .compare-mode:focus,
    .compare-textarea:focus {
      border-color: var(--accent);
    }

    .reset-btn:hover,
    .compare-remove-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    @media (max-width: 900px) {
      .album-layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 16px 12px;
      }

      .country-sidebar {
        position: static;
        max-height: none;
        margin-bottom: 20px;
        order: 1;
      }

      main {
        grid-column: 1 / -1;
        order: 2;
      }

      .country-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }

    @media (max-width: 480px) {
      .album-layout {
        grid-template-columns: 1fr;
      }

      .settings-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        grid-template-columns: 1fr 1fr;
      }

      .settings-select {
        min-width: 0;
        width: 100%;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
        gap: 5px;
      }
      .extra-badge {
        width: 15px;
        height: 15px;
        font-size: 0.52rem;
        top: -5px;
        right: -5px;
      }
    }
  </style>

async function loadState() {
  try {
    const res = await fetch('/api/state');
    state = await res.json();
  } catch(e) { state = {}; }
}

function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch('/api/state', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(state)
    });
  }, 300);
}

function getText() {
  return I18N[currentLanguage] || I18N.en;
}

function applyTheme(theme) {
  if (!document.querySelector(`#theme-select option[value="${theme}"]`)) theme = 'default';
  currentTheme = theme;
  document.body.dataset.theme = theme;
  document.getElementById('theme-select').value = theme;
  localStorage.setItem('fwc-theme', theme);
  updateSidebarOffset();
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

function applyLanguage(language) {
  if (!I18N[language]) language = 'en';
  currentLanguage = language;
  const text = getText();
  document.documentElement.lang = language;
  document.getElementById('language-select').value = language;
  localStorage.setItem('fwc-language', language);

  setText('owned-label', text.owned);
  setText('missing-label', text.missing);
  setText('extras-label', text.extras);
  setText('completion-label', text.completion);
  setText('export-btn', text.export);
  setText('reset-btn', text.reset);
  setText('complete-sections-label', text.completeSections);
  setText('sections-label', text.sections);
  setText('language-label', text.language);
  setText('theme-label', text.theme);

  const title = document.querySelector('header h1');
  if (title) title.textContent = text.albumTitle;

  const albumTab = document.querySelector('.tab-bar button[data-tab="album"]');
  const compareTab = document.querySelector('.tab-bar button[data-tab="compare"]');
  if (albumTab) albumTab.textContent = text.album;
  if (compareTab) compareTab.textContent = text.compare;

  document.querySelectorAll('#filter-bar button').forEach(button => {
    const labels = {
      all: text.all,
      missing: text.missingFilter,
      owned: text.ownedFilter,
      extras: text.extrasFilter
    };
    button.textContent = labels[button.dataset.filter] || button.textContent;
  });

  document.querySelector('#theme-select option[value="default"]').textContent = text.midnightGold;
  document.querySelector('#theme-select option[value="emerald"]').textContent = text.emerald;

  updateSectionTitles();
  updateCountryList();
  updateSidebarOffset();

}

function getVal(id) { return state[id] || 0; }

function handleClick(id) {
  const v = getVal(id);
  state[id] = v + 1;
  saveState();
  updateSticker(id);
  updateStats();
  updateCountryList();
  applyFilter(currentFilter);
}

function handleRightClick(e, id) {
  e.preventDefault();
  const v = getVal(id);
  if (v <= 0) return;
  state[id] = v - 1;
  if (state[id] === 0) delete state[id];
  saveState();
  updateSticker(id);
  updateStats();
  updateCountryList();
  applyFilter(currentFilter);
}

function updateSticker(id) {
  const el = document.getElementById('s-' + id);
  if (!el) return;
  const v = getVal(id);
  el.classList.toggle('owned', v >= 1);
  let badge = el.querySelector('.extra-badge');
  if (v >= 2) {
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'extra-badge';
      el.appendChild(badge);
    }
    badge.textContent = '+' + (v - 1);
  } else {
    if (badge) badge.remove();
  }
}

function getSectionFlag(stickers) {
  const firstId = stickers[0] || '';
  const prefix = firstId.replace(/\d+$/, '');
  return FLAG[firstId] || FLAG[prefix] || '';
}

function getTeamName(team) {
  return getText().countryNames[team.code] || team.name;
}

function getSectionTitle(sectionKey) {
  const text = getText();
  if (sectionKey === 'PANINI') return 'Panini';
  if (sectionKey === 'FWC') return text.fwcSection;
  if (sectionKey === 'CC') return text.cocaCola;
  const team = ALBUM_DATA.teams.find(item => item.code === sectionKey);
  return team ? `${team.code} — ${getTeamName(team)}` : sectionKey;
}

function updateSectionTitles() {
  document.querySelectorAll('.section[data-group]').forEach(section => {
    const title = getSectionTitle(section.dataset.group);
    const firstSticker = section.querySelector('.sticker');
    const titleEl = section.querySelector('.section-title');
    if (!titleEl || !firstSticker) return;
    const flag = getSectionFlag([firstSticker.dataset.id]);
    titleEl.textContent = flag ? `${flag} ${title}` : title;
    section.dataset.title = title;
  });
}

function buildSection(title, stickers, isFoil, extraClass, sectionKey) {
  const section = document.createElement('section');
  section.className = 'section';
  section.dataset.section = title;
  section.dataset.title = title;
  if (sectionKey) section.dataset.group = sectionKey;

  const header = document.createElement('div');
  header.className = 'section-header';

  const h2 = document.createElement('h2');
  h2.className = 'section-title';
  const flag = getSectionFlag(stickers);
  h2.textContent = flag ? `${flag} ${title}` : title;

  const prog = document.createElement('span');
  prog.className = 'section-progress';
  prog.dataset.section = title;
  header.appendChild(h2);
  header.appendChild(prog);
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'grid';

  stickers.forEach(id => {
    const cell = document.createElement('div');
    cell.className = 'sticker' + (isFoil ? ' foil' : '') + (extraClass ? ' ' + extraClass : '');
    cell.id = 's-' + id;
    cell.dataset.id = id;

    const code = document.createElement('span');
    code.className = 'code';
    code.textContent = id;
    cell.appendChild(code);

    cell.addEventListener('click', () => handleClick(id));
    cell.addEventListener('contextmenu', e => handleRightClick(e, id));

    grid.appendChild(cell);
  });

  section.appendChild(grid);
  return section;
}

function buildAlbum() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Panini logo sticker
  main.appendChild(buildSection('Panini', ALBUM_DATA.panini, true, '', 'PANINI'));

  // Special / FWC stickers
  main.appendChild(buildSection('FWC — Special Stickers', ALBUM_DATA.special, true, '', 'FWC'));

  // Team sections
  ALBUM_DATA.teams.forEach(team => {
    const ids = Array.from({length: team.count}, (_, i) => team.code + (i + 1));
    main.appendChild(buildSection(team.code + ' — ' + team.name, ids, false, '', team.code));
  });

  // Coca-Cola section
  main.appendChild(buildSection('CocaCola', ALBUM_DATA.cocacola, false, 'cocacola', 'CC'));
}

function getSidebarSections() {
  return [
    { key: 'PANINI', name: 'Panini', flag: FLAG['00'], ids: ALBUM_DATA.panini },
    { key: 'FWC', name: 'FWC', flag: FLAG.FWC, ids: ALBUM_DATA.special },
    ...ALBUM_DATA.teams.map(team => ({
      key: team.code,
      name: getTeamName(team),
      flag: FLAG[team.code],
      ids: Array.from({length: team.count}, (_, i) => team.code + (i + 1))
    })),
    { key: 'CC', name: getText().cocaCola, flag: FLAG.CC, ids: ALBUM_DATA.cocacola }
  ];
}

function getOwnedCount(ids) {
  return ids.reduce((owned, id) => owned + (getVal(id) >= 1 ? 1 : 0), 0);
}

function getMissingLabel(ids) {
  const missing = ids
    .filter(id => getVal(id) < 1)
    .map(id => id.replace(/^[A-Za-z]+/, ''));
  return missing.length === 0 ? getText().complete : missing.join(', ');
}

function positionMissingTooltip(x, y) {
  const tooltip = document.getElementById('missing-tooltip');
  const offset = 12;
  let left = x + offset;
  let top = y + offset;
  const rect = tooltip.getBoundingClientRect();

  if (left + rect.width > window.innerWidth - offset) {
    left = Math.max(offset, x - rect.width - offset);
  }
  if (top + rect.height > window.innerHeight - offset) {
    top = Math.max(offset, y - rect.height - offset);
  }

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

function showMissingTooltip(text, x, y) {
  const tooltip = document.getElementById('missing-tooltip');
  tooltip.textContent = '';
  if (text === getText().complete) {
    tooltip.textContent = text;
  } else {
    const label = document.createElement('span');
    label.className = 'missing-tooltip-label';
    label.textContent = getText().missingTooltip;
    tooltip.appendChild(label);
    tooltip.appendChild(document.createTextNode(text));
  }
  tooltip.classList.add('visible');
  positionMissingTooltip(x, y);
}

function hideMissingTooltip() {
  document.getElementById('missing-tooltip').classList.remove('visible');
}

function updateSidebarOffset() {
  const header = document.querySelector('header');
  const headerHeight = header ? Math.ceil(header.getBoundingClientRect().height) : 0;
  document.documentElement.style.setProperty('--sidebar-top', `${headerHeight + 12}px`);
}

function scrollToAlbumSection(section) {
  const header = document.querySelector('header');
  const headerOffset = header ? header.getBoundingClientRect().height : 0;
  const targetTop = section.getBoundingClientRect().top + window.scrollY - headerOffset - 14;
  window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
}

function buildCountryList() {
  const leftList = document.getElementById('country-list-left');
  const rightList = document.getElementById('country-list-right');
  const sections = getSidebarSections();
  const splitIndex = Math.ceil(sections.length / 2);
  leftList.innerHTML = '';
  rightList.innerHTML = '';

  sections.forEach((sectionData, index) => {
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'country-row';
    row.dataset.group = sectionData.key;
    row.dataset.missing = getMissingLabel(sectionData.ids);
    row.addEventListener('click', () => {
      const section = document.querySelector(`.section[data-group="${sectionData.key}"]`);
      if (section) scrollToAlbumSection(section);
    });
    row.addEventListener('mouseenter', e => showMissingTooltip(row.dataset.missing || '', e.clientX, e.clientY));
    row.addEventListener('mousemove', e => positionMissingTooltip(e.clientX, e.clientY));
    row.addEventListener('mouseleave', hideMissingTooltip);
    row.addEventListener('focus', () => {
      const rect = row.getBoundingClientRect();
      showMissingTooltip(row.dataset.missing || '', rect.right, rect.top);
    });
    row.addEventListener('blur', hideMissingTooltip);

    const name = document.createElement('span');
    name.className = 'country-name';
    const flag = sectionData.flag || '';
    name.textContent = flag ? `${flag} ${sectionData.name}` : sectionData.name;

    const completion = document.createElement('span');
    completion.className = 'country-completion';

    row.appendChild(name);
    row.appendChild(completion);
    const list = index < splitIndex ? leftList : rightList;
    list.appendChild(row);
  });
}

function updateCountryList() {
  let completeSections = 0;
  const sections = getSidebarSections();

  sections.forEach(sectionData => {
    const row = document.querySelector(`.country-row[data-group="${sectionData.key}"]`);
    if (!row) return;
    const owned = getOwnedCount(sectionData.ids);
    const total = sectionData.ids.length;
    const pct = Math.round((owned / total) * 100);
    const isComplete = owned === total;
    if (isComplete) completeSections++;
    const name = row.querySelector('.country-name');
    if (name) {
      const flag = sectionData.flag || '';
      name.textContent = flag ? `${flag} ${sectionData.name}` : sectionData.name;
    }
    row.classList.toggle('complete', isComplete);
    row.dataset.missing = getMissingLabel(sectionData.ids);
    row.querySelector('.country-completion').textContent = `${owned}/${total} ${pct}%`;
  });

  document.getElementById('complete-sections-count').textContent = completeSections;
  document.getElementById('complete-sections-total').textContent = sections.length;
}

function updateStats() {
  let owned = 0, extras = 0;
  Object.entries(state).forEach(([id, v]) => {
    if (v >= 1) owned++;
    if (v >= 2) extras += (v - 1);
  });
  document.getElementById('stat-owned').textContent = owned;
  document.getElementById('stat-missing').textContent = 994 - owned;
  document.getElementById('stat-extras').textContent = extras;
  document.getElementById('stat-pct').textContent = Math.round(owned / 994 * 100) + '%';

  // Section progress
  document.querySelectorAll('.section-progress[data-section]').forEach(el => {
    const sectionEl = el.closest('.section');
    const cells = sectionEl.querySelectorAll('.sticker');
    const total = cells.length;
    let sOwned = 0;
    cells.forEach(c => { if (getVal(c.dataset.id) >= 1) sOwned++; });
    el.innerHTML = `<span class="count">${sOwned}</span> / ${total}`;
  });
}

function refreshAllStickers() {
  document.querySelectorAll('.sticker').forEach(el => {
    updateSticker(el.dataset.id);
  });
}

let currentFilter = 'all';

function applyFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('#filter-bar button').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });

  document.querySelectorAll('.section').forEach(section => {
    const cells = section.querySelectorAll('.sticker');
    let visibleCount = 0;

    cells.forEach(cell => {
      const v = getVal(cell.dataset.id);
      let show = true;
      if (filter === 'missing') show = v === 0;
      else if (filter === 'owned') show = v >= 1;
      else if (filter === 'extras') show = v >= 2;
      cell.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });

    section.classList.toggle('hidden', filter !== 'all' && visibleCount === 0);
  });
}

document.getElementById('filter-bar').addEventListener('click', e => {
  if (e.target.dataset.filter) applyFilter(e.target.dataset.filter);
});

document.getElementById('tab-bar').addEventListener('click', e => {
  const tab = e.target.dataset.tab;
  if (!tab) return;
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.getElementById('filter-bar').style.display = tab === 'album' ? '' : 'none';
});

// Country code → flag emoji
const FLAG = {
  "00":"🏅","FWC":"🏆",
  "ALG":"🇩🇿","ARG":"🇦🇷","AUS":"🇦🇺","AUT":"🇦🇹","BEL":"🇧🇪",
  "BIH":"🇧🇦","BRA":"🇧🇷","CAN":"🇨🇦","CPV":"🇨🇻","COL":"🇨🇴",
  "CRO":"🇭🇷","CUW":"🇨🇼","CZE":"🇨🇿","COD":"🇨🇩","ECU":"🇪🇨",
  "EGY":"🇪🇬","ENG":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","FRA":"🇫🇷","GER":"🇩🇪","GHA":"🇬🇭",
  "HAI":"🇭🇹","IRN":"🇮🇷","IRQ":"🇮🇶","JPN":"🇯🇵","JOR":"🇯🇴",
  "MAR":"🇲🇦","MEX":"🇲🇽","NED":"🇳🇱","NZL":"🇳🇿","NOR":"🇳🇴",
  "PAN":"🇵🇦","PAR":"🇵🇾","POR":"🇵🇹","QAT":"🇶🇦","KSA":"🇸🇦",
  "SCO":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","SEN":"🇸🇳","RSA":"🇿🇦","KOR":"🇰🇷","ESP":"🇪🇸",
  "SWE":"🇸🇪","SUI":"🇨🇭","TUN":"🇹🇳","TUR":"🇹🇷","USA":"🇺🇸",
  "URU":"🇺🇾","UZB":"🇺🇿","CC":"🥤"
};

function exportList() {
  // Gather all visible sections
  const lines = [];
  const filterLabel = getText().filterLabels[currentFilter] || getText().filterLabels.all;

  lines.push(`Panini FIFA World Cup 2026 — ${filterLabel} Stickers`);
  lines.push('');

  document.querySelectorAll('.section:not(.hidden)').forEach(section => {
    const titleEl = section.querySelector('.section-title');
    const title = section.dataset.title || (titleEl ? titleEl.textContent : '');

    // Collect visible sticker cells
    const visibleCells = [...section.querySelectorAll('.sticker')]
      .filter(c => c.style.display !== 'none');

    if (visibleCells.length === 0) return;

    // Determine prefix for flag lookup
    const firstId = visibleCells[0].dataset.id;
    const prefix = firstId.replace(/\d+$/, '');
    const flagKey = FLAG[prefix] ? prefix : (FLAG[firstId] ? firstId : prefix);
    const flag = FLAG[flagKey] || FLAG[prefix] || '';

    const parts = visibleCells.map(c => {
      const id = c.dataset.id;
      const num = id.replace(/^[A-Za-z]+/, '');
      const v = getVal(id);
      if (currentFilter === 'extras') return v > 2 ? `${num}x${v - 1}` : num;
      return v >= 2 ? `${num}x${v}` : num;
    });

    lines.push(`${flag}  ${title}: ${parts.join(', ')}`);
  });

  const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fwc2026_${currentFilter}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('export-btn').addEventListener('click', exportList);

// ── Compare ──────────────────────────────────────────────────────────────────

function parsePaste(text) {
  const ids = new Set();
  for (const line of text.split('\n')) {
    const colonIdx = line.indexOf(':');
    if (colonIdx === -1) continue;
    const left = line.slice(0, colonIdx).trim();
    const right = line.slice(colonIdx + 1).trim();
    if (!right) continue;
    let prefix = '';
    const tokens = left.split(/[\s—–]+/);
    const codeToken = tokens.reverse().find(t => /^[A-Z0-9]{2,5}$/.test(t));
    if (codeToken) prefix = codeToken === 'Stickers' ? 'FWC' : codeToken;
    else if (left.includes('CocaCola')) prefix = 'CC';
    for (const item of right.split(',').map(s => s.trim()).filter(Boolean)) {
      const num = item.replace(/x\d+$/i, '').trim();
      if (!num) continue;
      ids.add(/^[A-Za-z]/.test(num) ? num : prefix + num);
    }
  }
  return ids;
}

function getStickerGroup(id) {
  if (/^\d+$/.test(id)) return '00';
  return id.replace(/\d+$/, '');
}

function getGroupLabel(prefix) {
  if (prefix === '00') return 'Panini';
  return prefix;
}

function computeMatches(theirIds, mode) {
  const grouped = {};
  for (const id of theirIds) {
    const prefix = getStickerGroup(id);
    const num = id.replace(/^[A-Za-z]+/, '');
    const myVal = getVal(id);
    const match = mode === 'extras' ? myVal === 0 : myVal >= 2;
    if (match) {
      if (!grouped[prefix]) grouped[prefix] = [];
      grouped[prefix].push({ num, id, myVal });
    }
  }
  return grouped;
}

function renderCompareBlock(entry) {
  const text = getText();
  const { id, name, mode, grouped } = entry;
  const prefixes = Object.keys(grouped);
  const totalMatches = prefixes.reduce((s, p) => s + grouped[p].length, 0);
  const modeLabel = mode === 'extras'
    ? text.extrasModeLabel
    : text.missingModeLabel;

  const block = document.createElement('div');
  block.className = 'compare-result-block';
  block.dataset.id = id;

  let html = `<div class="compare-result-header">
    <div class="compare-result-name">${name} — ${totalMatches} ${totalMatches === 1 ? text.match : text.matches}</div>
    <button class="compare-remove-btn" data-id="${id}">${text.remove}</button>
  </div>`;
  html += `<div class="compare-result-row" style="margin-bottom:10px;font-size:0.72rem;color:#666;">${modeLabel}</div>`;

  if (totalMatches === 0) {
    html += `<div class="compare-none">${text.noMatches}</div>`;
  } else {
    for (const prefix of prefixes.sort()) {
      const flag = FLAG[prefix] || '';
      const label = getGroupLabel(prefix);
      const parts = grouped[prefix].map(({ num, myVal }) => {
        if (mode === 'missing') {
          const extras = myVal - 1;
          return extras > 1 ? `<span class="compare-match">${num}x${extras}</span>` : `<span class="compare-match">${num}</span>`;
        }
        return `<span class="compare-match">${num}</span>`;
      });
      html += `<div class="compare-result-row">${flag} <strong>${label}:</strong> ${parts.join(', ')}</div>`;
    }
  }

  block.innerHTML = html;
  block.querySelector('.compare-remove-btn').addEventListener('click', () => removeCompareEntry(id));
  return block;
}

async function loadCompareHistory() {
  try {
    const res = await fetch('/api/compare');
    const entries = await res.json();
    const resultsEl = document.getElementById('compare-results');
    resultsEl.innerHTML = '';
    entries.forEach(entry => resultsEl.appendChild(renderCompareBlock(entry)));
  } catch(e) {}
}

async function removeCompareEntry(id) {
  await fetch(`/api/compare/${id}`, { method: 'DELETE' });
  const block = document.querySelector(`.compare-result-block[data-id="${id}"]`);
  if (block) block.remove();
}

async function runCompare() {
  const name = document.getElementById('compare-name').value.trim() || 'Result';
  const mode = document.getElementById('compare-mode').value;
  const paste = document.getElementById('compare-paste').value;
  const resultsEl = document.getElementById('compare-results');

  const theirIds = parsePaste(paste);
  if (theirIds.size === 0) {
    const message = document.createElement('p');
    message.className = 'compare-none';
    message.textContent = getText().parseError;
    resultsEl.insertBefore(message, resultsEl.firstChild);
    return;
  }

  const grouped = computeMatches(theirIds, mode);
  const entry = { name, mode, grouped };

  const res = await fetch('/api/compare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  });
  const saved = await res.json();

  resultsEl.insertBefore(renderCompareBlock(saved), resultsEl.firstChild);
  document.getElementById('compare-paste').value = '';
}

document.getElementById('compare-btn').addEventListener('click', runCompare);

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm(getText().resetConfirm)) {
    state = {};
    saveState();
    refreshAllStickers();
    updateStats();
    updateCountryList();
    applyFilter(currentFilter);
  }
});
